<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found — AZ Custom Knives</title>
    <meta name="description" content="The page you're looking for doesn't exist or has been moved. Return to AZ Custom Knives home, booking, contact, or shop.">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forge-red: #990000;
            --forge-red-hover: #770000;
            --steel-gray: #78909C;
            --black: #000;
            --white: #FFF;
            --off-white: #FAFAFA;
            --light-gray: #F0F0F0;
            --text: #1a1a1a;
        }
        body {
            font-family: Effra, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background-color: var(--off-white);
        }
        .error-wrap {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-container {
            text-align: center;
            background: var(--white);
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .error-container h1 {
            font-family: Oswald, sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }
        .error-container .subtitle {
            font-size: 1.1rem;
            color: var(--steel-gray);
            margin-bottom: 2rem;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .help-link {
            display: inline-block;
            background-color: var(--forge-red);
            color: var(--white);
            padding: 0.85rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-family: Oswald, sans-serif;
            transition: background-color 0.3s ease;
        }
        .help-link:hover { background-color: var(--forge-red-hover); }
        .help-link-secondary { background-color: var(--light-gray); color: var(--text); }
        .help-link-secondary:hover { background-color: #e0e0e0; }
        @media (max-width: 640px) {
            .error-container { padding: 2rem; }
            .error-container h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Header injected by /js/components.js — single source of truth for all pages -->
    <div id="site-header"></div>

    <main class="error-wrap">
        <div class="error-container">
            <h1>404</h1>
            <p class="subtitle">The page you're looking for doesn't exist or has been moved.</p>
            <div class="link-list">
                <a href="index.html" class="help-link">Home</a>
                <a href="pages/booking.html" class="help-link help-link-secondary">Book a Class</a>
                <a href="pages/contact.html" class="help-link help-link-secondary">Contact Us</a>
                <a href="https://shop.azcustomknives.com" target="_blank" class="help-link help-link-secondary">Shop</a>
            </div>
        </div>
    </main>

    <!-- Footer injected by /js/components.js -->
    <div id="site-footer"></div>

    <script src="js/components.js"></script>
</body>
</html>
