<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>From the Forge - AZ Custom Knives</title>

  <!-- Shared Components -->
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/style.css">

  <style>
    /* Blog-specific styles — only what's unique to this page */
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #78909C;
      max-width: 600px;
      margin: 0 auto;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .blog-card {
      background: #FFF;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .blog-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .blog-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #F0F0F0 0%, #e0e0e0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      border-bottom: 1px solid #F0F0F0;
    }

    .blog-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .blog-content {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .blog-date {
      font-size: 0.85rem;
      color: #78909C;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .blog-card h3 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .blog-excerpt {
      color: #333;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      flex-grow: 1;
    }

    .blog-link {
      color: #990000;
      text-decoration: none;
      font-weight: 600;
      font-family: 'Oswald', sans-serif;
      transition: color 0.3s ease;
      align-self: flex-start;
    }

    .blog-link:hover {
      color: #770000;
    }

    .footer-note {
      background: #FFF;
      padding: 2rem;
      border-radius: 8px;
      text-align: center;
      color: #78909C;
      margin-bottom: 3rem;
      border-left: 4px solid #990000;
    }

    .footer-note strong {
      color: #1a1a1a;
    }

    @media (max-width: 768px) {
      main { padding: 2rem 1rem; }
      .page-header h1 { font-size: 2rem; }
      .blog-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page-header h1 { font-size: 1.5rem; }
      .subtitle { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Shared header injected by components.js -->
  <div id="site-header"></div>

  <main>
    <div class="page-header">
      <h1>From the Forge</h1>
      <p class="subtitle">Stories, tips, and behind-the-scenes from the AZCK workshop.</p>
    </div>

    <div id="blog-grid" class="blog-grid"></div>

    <div class="footer-note">
      <p><strong>Full posts coming soon.</strong> Follow us on Instagram <strong><a href="https://www.instagram.com/az_custom_knives/" target="_blank" style="color:#990000;text-decoration:none;">@az_custom_knives</a></strong> for daily updates from the workshop.</p>
    </div>
  </main>

  <!-- Shared footer injected by components.js -->
  <div id="site-footer"></div>

  <!-- Shared Components JS -->
  <script src="../js/components.js"></script>

  <!-- ENGINE: Renders blog posts from JSON data.
       Edit posts in data/blog-posts.json — never touch this HTML.
       Phase 5: swap fetch URL to Supabase endpoint, same JSON schema. -->
  <script>
    (function() {
      var grid = document.getElementById('blog-grid');

      function renderPosts(posts) {
        grid.innerHTML = '';
        posts.forEach(function(post) {
          var isEmoji = !post.image || post.image.length <= 4;
          var imageContent = isEmoji
            ? post.image || '\uD83D\uDCF8'
            : '<img src="' + post.image + '" alt="' + post.title + '">';

          var card = document.createElement('article');
          card.className = 'blog-card';
          card.innerHTML =
            '<div class="blog-image">' + imageContent + '</div>' +
            '<div class="blog-content">' +
              '<span class="blog-date">' + post.date + '</span>' +
              '<h3>' + post.title + '</h3>' +
              '<p class="blog-excerpt">' + post.excerpt + '</p>' +
              '<a href="' + post.link + '" target="_blank" class="blog-link">' +
                (post.linkText || 'Read More \u2192') +
              '</a>' +
            '</div>';
          grid.appendChild(card);
        });
      }

      function showFallback() {
        grid.innerHTML =
          '<p style="grid-column:1/-1;text-align:center;color:#78909C;padding:2rem;">' +
          'Posts are loading \u2014 follow <a href="https://www.instagram.com/az_custom_knives/" target="_blank" style="color:#990000;">@az_custom_knives</a> for updates.</p>';
      }

      fetch('data/blog-posts.json')
        .then(function(r) { return r.json(); })
        .then(function(data) { renderPosts(data.posts); })
        .catch(showFallback);
    })();
  </script>

</body>
</html>
