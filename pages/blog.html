<!DOCTYPE html>
<!--
  pages/blog.html — Blog Engine (grid)

  Reads window.BLOG_POSTS from /js/blog-posts.js and renders cards dynamically.
  Sorted by `date` descending. Each card links to post.html?post=<slug>.

  Adding a post = edit /js/blog-posts.js. This file does not change.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From the Forge — AZ Custom Knives</title>
    <meta name="description" content="Stories, tips, and behind-the-scenes from the AZCK workshop.">
    <link rel="canonical" href="https://azcustomknives.com/pages/blog.html">
    <meta property="og:title" content="From the Forge — AZ Custom Knives">
    <meta property="og:description" content="Stories, tips, and behind-the-scenes from the AZCK workshop.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://azcustomknives.com/pages/blog.html">
    <meta name="twitter:card" content="summary">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        :root {
            --forge-red: #990000;
            --forge-red-hover: #770000;
            --steel-gray: #78909C;
            --black: #000;
            --white: #FFF;
            --off-white: #FAFAFA;
            --light-gray: #F0F0F0;
            --dark-gray: #333;
            --text: #1a1a1a;
            --header-height: 72px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Effra, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background-color: var(--off-white);
            line-height: 1.6;
        }

        main {
            max-width: 920px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: Oswald, sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--steel-gray);
            max-width: 600px;
            margin: 0 auto;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .blog-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .blog-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--light-gray) 0%, #e0e0e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border-bottom: 1px solid var(--light-gray);
            background-size: cover;
            background-position: center;
        }

        .blog-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-meta {
            font-size: 0.85rem;
            color: var(--steel-gray);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .blog-card h3 {
            font-family: Oswald, sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .blog-excerpt {
            color: var(--dark-gray);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .blog-link {
            color: var(--forge-red);
            text-decoration: none;
            font-weight: 600;
            font-family: Oswald, sans-serif;
            transition: color 0.3s ease;
            align-self: flex-start;
        }

        .blog-card:hover .blog-link {
            color: var(--forge-red-hover);
        }

        .footer-note {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            color: var(--steel-gray);
            margin-bottom: 3rem;
            border-left: 4px solid var(--forge-red);
        }

        .footer-note strong { color: var(--text); }
        .footer-note a { color: var(--forge-red); text-decoration: none; }

        .empty-state {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 8px;
            text-align: center;
            color: var(--steel-gray);
            margin-bottom: 3rem;
        }

        .admin-gear {
            display: block;
            text-align: right;
            margin-top: 2rem;
            opacity: 0.4;
            font-size: 1rem;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .admin-gear:hover { opacity: 1; }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .blog-grid { grid-template-columns: 1fr; }
            main { padding: 2rem 1rem; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.5rem; }
            .subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- HEADER injected by /js/components.js -->
    <div id="site-header"></div>

    <main>
        <div class="page-header">
            <h1>From the Forge</h1>
            <p class="subtitle">Stories, tips, and behind-the-scenes from the AZCK workshop.</p>
        </div>

        <noscript>
            <div class="footer-note">
                <p><strong>Posts unavailable.</strong> Enable JavaScript or follow us on Instagram <a href="https://www.instagram.com/az_custom_knives/" target="_blank" rel="noopener">@az_custom_knives</a> for daily updates.</p>
            </div>
        </noscript>

        <div id="blog-grid" class="blog-grid"></div>

        <div class="footer-note">
            <p><strong>More posts coming soon.</strong> Follow us on Instagram <a href="https://www.instagram.com/az_custom_knives/" target="_blank" rel="noopener">@az_custom_knives</a> for daily updates.</p>
        </div>

        <a class="admin-gear" href="https://command.azcustomknives.com/" aria-label="Admin">⚙️</a>
    </main>

    <!-- FOOTER injected by /js/components.js -->
    <div id="site-footer"></div>

    <script src="../js/blog-posts.js"></script>
    <script src="../js/components.js"></script>
    <script>
        (function renderBlogGrid() {
            var grid = document.getElementById('blog-grid');
            if (!grid) return;

            try {
                var posts = (window.BLOG_POSTS || []).slice().sort(function (a, b) {
                    return (b.date || '').localeCompare(a.date || '');
                });

                if (posts.length === 0) {
                    grid.outerHTML = '<div class="empty-state"><strong>No posts yet.</strong><br>Check back soon — or follow <a href="https://www.instagram.com/az_custom_knives/" target="_blank" rel="noopener" style="color:#990000;">@az_custom_knives</a> for daily updates.</div>';
                    return;
                }

                var escapeHTML = function (str) {
                    return String(str == null ? '' : str)
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;');
                };

                grid.innerHTML = posts.map(function (post) {
                    var slug = encodeURIComponent(post.slug || '');
                    var image = post.heroImage
                        ? 'style="background-image:url(\'' + escapeHTML(post.heroImage) + '\');"'
                        : '';
                    var iconHTML = post.heroImage ? '' : escapeHTML(post.icon || '📝');
                    return [
                        '<a class="blog-card" href="post.html?post=' + slug + '">',
                            '<div class="blog-image" ' + image + '>' + iconHTML + '</div>',
                            '<div class="blog-content">',
                                '<div class="blog-meta">',
                                    '<span>' + escapeHTML(post.dateDisplay || '') + '</span>',
                                    '<span>' + escapeHTML(post.category || '') + '</span>',
                                '</div>',
                                '<h3>' + escapeHTML(post.title || 'Untitled') + '</h3>',
                                '<p class="blog-excerpt">' + escapeHTML(post.excerpt || '') + '</p>',
                                '<span class="blog-link">Read More →</span>',
                            '</div>',
                        '</a>'
                    ].join('');
                }).join('');
            } catch (err) {
                grid.outerHTML = '<div class="empty-state"><strong>Posts unavailable.</strong> Follow us on Instagram <a href="https://www.instagram.com/az_custom_knives/" target="_blank" rel="noopener" style="color:#990000;">@az_custom_knives</a>.</div>';
            }
        })();
    </script>
</body>
</html>
